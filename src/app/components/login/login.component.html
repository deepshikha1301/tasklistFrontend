<div class="card form-container">
  <div class="center">
    <h2>Login</h2>
    <p class="muted">Sign in to your account</p>
  </div>

  <form #loginForm="ngForm" (ngSubmit)="submit(loginForm)">
    <label>
      Login ID
      <input
        required
        name="loginid"
        [(ngModel)]="loginid"
        #loginidModel="ngModel"
      />
    </label>
    <div *ngIf="loginidModel.invalid && loginidModel.touched" class="error">
      Login ID is required.
    </div>

    <label>
      Password
      <input
        required
        type="password"
        name="password"
        [(ngModel)]="password"
        #passwordModel="ngModel"
      />
    </label>
    <div *ngIf="passwordModel.invalid && passwordModel.touched" class="error">
      Password is required.
    </div>

    <div style="margin-top:0.75rem; display:flex; gap:0.5rem; justify-content:flex-end;">
      <button type="submit" class="btn" [disabled]="loginForm.invalid">Sign In</button>
    </div>
  </form>

  <p style="margin-top:0.75rem; text-align:center">Don't have an account? <a routerLink="/signup">Sign up</a></p>
</div>
